<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>离线缓存 - LibreTV</title>
    <script src="libs/tailwindcss.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 10; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .group-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .group-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .group-header:active { background: rgba(255,255,255,0.03); }
        .group-body { border-top: 1px solid rgba(255,255,255,0.04); }
        .ep-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .ep-item:last-child { border-bottom: none; }
        .progress-bar { background: rgba(255,255,255,0.06); border-radius: 3px; height: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500; border: 1px solid; white-space: nowrap; }
        .btn-play { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.2); color: #00ff88; }
        .btn-pause { background: rgba(255,204,0,0.1); border-color: rgba(255,204,0,0.2); color: #ffcc00; }
        .btn-resume { background: rgba(0,204,255,0.1); border-color: rgba(0,204,255,0.2); color: #00ccff; }
        .btn-retry { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.2); color: #ff5050; }
        .btn-delete { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.15); color: #cc4444; }
        .btn-cache { background: rgba(0,204,255,0.1); border-color: rgba(0,204,255,0.2); color: #00ccff; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast-success { background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
        .toast-error { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3); color: #ff5050; }
        .toast-info { background: rgba(0,204,255,0.15); border: 1px solid rgba(0,204,255,0.3); color: #00ccff; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:center;padding:12px 16px;gap:12px;">
            <button onclick="history.back()" style="background:none;border:none;color:#fff;cursor:pointer;padding:4px;">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span style="font-size:17px;font-weight:600;">离线缓存</span>
            <span id="totalCount" style="font-size:12px;color:#888;margin-left:auto;"></span>
        </div>
    </div>
    <div id="cacheList" style="padding:12px;max-width:600px;margin:0 auto;"></div>
    <div id="toast" class="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/proxy-auth.js"></script>
    <script>
    let offlineDB = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (offlineDB && !offlineDB.closed) { resolve(offlineDB); return; }
            offlineDB = null;
            const req = indexedDB.open('LibreTVOffline', 5);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (db.objectStoreNames.contains('segments')) db.deleteObjectStore('segments');
                if (!db.objectStoreNames.contains('videos')) db.createObjectStore('videos', { keyPath: 'id' });
                db.createObjectStore('segments', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('blobs')) db.createObjectStore('blobs', { keyPath: 'id' });
            };
            req.onsuccess = (e) => { offlineDB = e.target.result; offlineDB.onclose = () => { offlineDB = null; }; offlineDB.onversionchange = () => { offlineDB.close(); offlineDB = null; }; resolve(offlineDB); };
            req.onerror = (e) => { offlineDB = null; reject(e.target.error); };
            req.onblocked = () => { offlineDB = null; reject(new Error('数据库被占用')); };
        });
    }

    async function getAllVideos() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('videos', 'readonly');
            const req = tx.objectStore('videos').getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error);
        });
    }

    async function getVideo(id) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('videos', 'readonly');
            const req = tx.objectStore('videos').get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function saveVideo(record) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction('videos', 'readwrite');
            tx.objectStore('videos').put(record);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    async function deleteVideo(id) {
        const db = await openDB();
        const video = await getVideo(id);
        const segCount = video?.segmentCount || 0;
        const keyCount = video?.keyCount || 0;
        return new Promise((resolve, reject) => {
            const tx = db.transaction(['videos', 'segments', 'blobs'], 'readwrite');
            tx.objectStore('videos').delete(id);
            tx.objectStore('blobs').delete(id);
            for (let i = 0; i < segCount; i++) tx.objectStore('segments').delete(id + '_' + i);
            for (let i = 0; i < keyCount; i++) tx.objectStore('segments').delete(id + '_key_' + i);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    function formatBytes(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast toast-' + (type || 'info') + ' show';
        setTimeout(() => { el.className = 'toast'; }, 2500);
    }

    async function renderList() {
        const videos = await getAllVideos();
        const container = document.getElementById('cacheList');
        const countEl = document.getElementById('totalCount');

        if (videos.length === 0) {
            container.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">📱</div><div style="font-size:15px;margin-bottom:8px;">暂无离线缓存</div><div style="font-size:12px;">播放视频时点击"离线"按钮即可缓存</div></div>';
            if (countEl) countEl.textContent = '';
            return;
        }

        const groups = {};
        videos.forEach(v => {
            const key = (v.title || '未知节目') + '||' + (v.sourceCode || '');
            if (!groups[key]) groups[key] = { title: v.title || '未知节目', sourceCode: v.sourceCode || '', episodes: [] };
            groups[key].episodes.push(v);
        });

        const groupList = Object.values(groups);
        if (countEl) countEl.textContent = videos.length + '个缓存';

        let html = '';
        groupList.forEach((group, gi) => {
            const completedCount = group.episodes.filter(e => e.status === 'complete').length;
            const totalCount = group.episodes.length;
            const totalSize = group.episodes.reduce((s, e) => s + (e.blobSize || 0), 0);
            const hasCaching = group.episodes.some(e => e.status === 'caching');
            const hasPaused = group.episodes.some(e => e.status === 'paused');
            const hasError = group.episodes.some(e => e.status === 'error');

            html += '<div class="group-card">';
            html += '<div class="group-header" onclick="toggleGroup(' + gi + ')">';
            html += '<div style="width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,rgba(0,204,255,0.15),rgba(0,255,136,0.1));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🎬</div>';
            html += '<div style="flex:1;min-width:0;">';
            html += '<div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + group.title + '</div>';
            html += '<div style="font-size:11px;color:#888;margin-top:2px;">' + completedCount + '/' + totalCount + '集已缓存 · ' + formatBytes(totalSize) + '</div>';
            html += '</div>';
            html += '<div style="display:flex;gap:6px;flex-shrink:0;">';
            if (hasCaching) html += '<span style="font-size:10px;color:#00ccff;background:rgba(0,204,255,0.1);padding:2px 8px;border-radius:10px;">下载中</span>';
            else if (hasPaused) html += '<span style="font-size:10px;color:#ffcc00;background:rgba(255,204,0,0.1);padding:2px 8px;border-radius:10px;">已暂停</span>';
            else if (hasError) html += '<span style="font-size:10px;color:#ff5050;background:rgba(255,80,80,0.1);padding:2px 8px;border-radius:10px;">有失败</span>';
            html += '<svg id="arrow-' + gi + '" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#888" stroke-width="2" style="transition:transform 0.2s;"><path d="M9 5l7 7-7 7"/></svg>';
            html += '</div></div>';

            html += '<div id="group-' + gi + '" class="group-body" style="display:none;">';
            group.episodes.sort((a, b) => (a.episodeIndex || 0) - (b.episodeIndex || 0));
            group.episodes.forEach(video => {
                const progressText = (typeof video.progress === 'number') ? video.progress.toFixed(2) : '0.00';
                const sizeText = video.blobSize ? formatBytes(video.blobSize) : '';
                const pct = video.status === 'complete' ? 100 : (video.progress || 0);
                const barColor = video.status === 'complete' ? 'linear-gradient(90deg,#00ff88,#00cc66)' : video.status === 'paused' ? 'linear-gradient(90deg,#ffcc00,#ff9900)' : video.status === 'error' ? 'linear-gradient(90deg,#ff5050,#cc3333)' : 'linear-gradient(90deg,#00ccff,#00ff88)';

                html += '<div class="ep-item">';
                html += '<div style="display:flex;align-items:center;gap:10px;">';
                html += '<div style="width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;flex-shrink:0;">' + ((video.episodeIndex || 0) + 1) + '</div>';
                html += '<div style="flex:1;min-width:0;">';
                html += '<div style="font-size:13px;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (video.episodeName || '第' + ((video.episodeIndex || 0) + 1) + '集') + '</div>';
                html += '<div style="font-size:10px;color:#666;margin-top:1px;">';
                if (video.status === 'complete') html += '<span style="color:#00ff88;">✅ 已缓存</span> ' + sizeText;
                else if (video.status === 'caching') html += '<span style="color:#00ccff;">⬇ ' + progressText + '%</span> ' + sizeText;
                else if (video.status === 'paused') html += '<span style="color:#ffcc00;">⏸ ' + progressText + '%</span> ' + sizeText;
                else html += '<span style="color:#ff5050;">❌ 失败</span>';
                html += '</div></div>';
                html += '<div style="display:flex;gap:4px;flex-shrink:0;">';
                if (video.status === 'complete') {
                    html += '<button class="btn btn-play" onclick="playVideo(\'' + video.id + '\')">播放</button>';
                } else if (video.status === 'caching') {
                    html += '<button class="btn btn-pause" onclick="pauseVideo(\'' + video.id + '\')">暂停</button>';
                } else if (video.status === 'paused') {
                    html += '<button class="btn btn-resume" onclick="resumeVideo(\'' + video.id + '\')">继续</button>';
                } else {
                    html += '<button class="btn btn-retry" onclick="retryVideo(\'' + video.id + '\')">重试</button>';
                }
                html += '<button class="btn btn-delete" onclick="deleteVideoConfirm(\'' + video.id + '\')">删除</button>';
                html += '</div></div>';

                html += '<div style="margin-top:6px;margin-left:34px;">';
                html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + barColor + ';"></div></div>';
                html += '</div></div>';
            });
            html += '</div></div>';
        });

        container.innerHTML = html;
    }

    function toggleGroup(gi) {
        const body = document.getElementById('group-' + gi);
        const arrow = document.getElementById('arrow-' + gi);
        if (!body) return;
        if (body.style.display === 'none') {
            body.style.display = 'block';
            if (arrow) arrow.style.transform = 'rotate(90deg)';
        } else {
            body.style.display = 'none';
            if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }

    function playVideo(id) {
        window.location.href = 'player.html?offline=true&id=' + encodeURIComponent(id);
    }

    async function pauseVideo(id) {
        const video = await getVideo(id);
        if (video && video.status === 'caching') {
            video.status = 'paused';
            await saveVideo(video);
            showToast('已暂停', 'info');
            renderList();
        }
    }

    function resumeVideo(id) {
        window.location.href = 'player.html?offline=true&id=' + encodeURIComponent(id) + '&action=resume';
    }

    function retryVideo(id) {
        window.location.href = 'player.html?offline=true&id=' + encodeURIComponent(id) + '&action=retry';
    }

    async function deleteVideoConfirm(id) {
        if (confirm('确定删除此缓存？')) {
            await deleteVideo(id);
            showToast('已删除', 'success');
            renderList();
        }
    }

    renderList();
    </script>
</body>
</html>
